<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: pink;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background-color: rgba(128, 0, 128, 1);
            width: 50px;
            height: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            opacity: 1;
            transform: translate(-50%, -50%)rotate(0) scale(2) skew(20deg);
            box-shadow: 4px 4px 4px 0px rgba(0, 0, 0);
        }

        .box:hover {
            background-color: rgba(238, 130, 238);

        }

        .box:active {
            box-shadow: 4px 4px 4px 0px inset rgba(0, 0, 0);
        }
    </style>

</head>

<body>
    mundo <br>
    mundo <br>
    mundo <br>
    mundo <br>
    mundo <br>
    mundo <br>
    <div class="box">Olá</div>
</body>

</html>
