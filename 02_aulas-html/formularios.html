<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>

<body>
    <h1>Formulários</h1>

    <form>
        <label for="texto">Texto</label>
        <br />
        <textarea name="texto" placeholder="Digite algum texto"></textarea>
        <br />
        <label for="profissão">Profissão</label>
        <br />
        <select name="profissão">
            <option value="Desenvolvedor">Desenvolvedor</option>
            <option value="Programador">Programador</option>
            <option value="RH">RH</option>
            <option value="Professor">Professor</option>
            <option value="Contador">Contador</option>
        </select>
        <br />
        <label>
            <p>Nome</p>
            <input type="text" name="name" placeholder="Digite o seu nome">
        </label>
        <br />
        <label>
            <p>E-mail</p>
            <input type="email" name="email" placeholder="Digite o seu email">
        </label>
        <br />
        <label>
            <p>Senha</p>
            <input type="password" name="senha" placeholder="Digite sua senha">
        </label>
        <br />
        <label>
            <p>Cor</p>
            <input type="color" name="cor" placeholder="Escolha uma cor">
        </label>
        <br />
        <label>
            <p>Data de aniversário</p>
            <input type="date" name="aniversario" placeholder="Digite sua data de aniversário">
        </label>
        <br />
        <label>
            <p>Digite o horário</p>
            <input type="time" name="horario" placeholder="Digite o horário">
        </label>
        <br />
        <label>
            <p>Digte a data e hora</p>
            <input type="datetime-local" name="data-hora" placeholder="Digite a data e a hora">
        </label>
        <br />
        <label>
            <p>Digite o mês</p>
            <input type="month" name="mes" placeholder="Digite o mês">
        </label>
        <br />
        <label>
            <p>Seu número da sorte</p>
            <input type="number" name="numero" placeholder="Escolha um número">
        </label>
        <br />
        <label>
            <p>Escolha um número de 0 a 4</p>
            <input type="range" name="range" min="0" max="4" placeholder="Escolha um número">
        </label>
        <br />
        <label>
            <p>Faça uma busca</p>
        </label>
        <input type="search" name="buscas" placeholder="Faça uma busca">
        </label>
        <br />
        <label>
            <p>Digite seu telefone</p>
            <input type="tel" name="telefone" placeholder="Digite seu telefone">
        </label>
        <br />
        <label>
            <p>Dgite um link</p>
            <input type="url" name="url" placeholder="Digite um link">
        </label>
        <br />
        <label>
            <p>Semana</p>
            <input type="week" name="week" placeholder="Semana">
        </label>
        <br />
        <label>
            <p>Botão oculto</p>
            <input type="hidden" name="escondido" placeholder="Botão escondido">
        </label>
        <br />
        <label>
            <input type="radio" name="sexo" value="Masculino">
            <span>Masculino</span>
        </label>
        <br />
        <label>
            <input type="radio" name="sexo" value="Feminino">
            <span>Feminino</span>
        </label>
        <br />
        <label>
            <input type="checkbox" name="estilo-musical" value="jazz">
            <span>Jazz</span>
        </label>
        <br />
        <label>
            <input type="checkbox" name="estilo-musical" value="blues">
            <span>Blues</span>
        </label>
        <br />
        <label>
            <input type="checkbox" name="estilo-musical" value="hip-hop">
            <span>Hip-Hop</span>
        </label>
        <br />
        <label>
            <input type="checkbox" name="estilo-musical" value="rock">
            <span>Rock</span>
        </label>
        <br />
        <label>
            <input type="checkbox" name="estilo-musical" value="country">
            <span>Country</span>
        </label>
        <br />
        <label>
            <p>Escolha um arquivo</p>
            <input type="file" placeholder="Escolha sua foto">
            <br />

            <button type="button">Button</button>
            <br />
            <button type="reset">Reset</button>
            <br />
            <button type="submit">Submit</button>
            <br />
    </form>

</body>

</html>
