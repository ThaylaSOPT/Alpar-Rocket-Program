<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>
    <h1>Contato - Element Coffee</h1>
    <form>
        <label for="nome">Nome Completo:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Digite o seu nome" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Digite o seu e-mail" required><br><br>

        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone" placeholder="Digite o seu telefone"><br><br>

        <label for="assunto">Assunto:</label><br>
        <input type="text" id="assunto" name="assunto" placeholder="Assunto a ser tratado" required><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="5" cols="30" placeholder="Deixe-nos sua mensagem"
            required></textarea><br><br>

        <input type="submit" value="Enviar">

    </form>

    <br>
    <a href="../index.html">Voltar ao Portfólio</a>
    <p>
        <a href="./index.html">Voltar ao cardápio</a>
    </p>

</body>

</html>
</body>

</html>
